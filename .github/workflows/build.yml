name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact: ap-text-client-linux
            binary: ap-text-client
          - os: macos-latest
            artifact: ap-text-client-macos
            binary: ap-text-client
          - os: windows-latest
            artifact: ap-text-client-windows
            binary: ap-text-client.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build binary
        run: >
          uv run pyinstaller
          --onefile
          --noconfirm
          --name ap-text-client
          --collect-all textual
          --collect-all rich
          entry.py

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [lint, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v7
        with:
          path: dist

      - name: Package binaries
        run: |
          cd dist
          chmod +x ap-text-client-linux/ap-text-client ap-text-client-macos/ap-text-client
          tar -C ap-text-client-linux -czf ap-text-client-linux.tar.gz ap-text-client
          tar -C ap-text-client-macos -czf ap-text-client-macos.tar.gz ap-text-client
          (cd ap-text-client-windows && zip ../ap-text-client-windows.zip ap-text-client.exe)

      - name: Build release notes
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --current --strip header --output release-notes.md

      - name: Append downloads table
        run: |
          cat >> release-notes.md <<'EOF'

          ## Downloads

          | Platform | File | Requirement |
          |---|---|---|
          | Linux x86_64 | `ap-text-client-linux.tar.gz` | glibc ≥ 2.39 (Ubuntu 24.04+, Debian 13+, Fedora 40+) |
          | macOS arm64 | `ap-text-client-macos.tar.gz` | macOS 14 Sonoma or newer, Apple Silicon |
          | Windows x86_64 | `ap-text-client-windows.zip` | Windows 10 or newer |

          Older systems: build from source — see the [README](../../blob/main/README.md#install-from-source).
          EOF

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/ap-text-client-linux.tar.gz
            dist/ap-text-client-macos.tar.gz
            dist/ap-text-client-windows.zip
          body_path: release-notes.md
