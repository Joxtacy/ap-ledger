name: build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    name: build (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact: ap-text-client-macos
            binary: ap-text-client
          - os: windows-latest
            artifact: ap-text-client-windows
            binary: ap-text-client.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Build binary
        run: >
          uv run pyinstaller
          --onefile
          --noconfirm
          --name ap-text-client
          --collect-all textual
          --collect-all rich
          entry.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.binary }}
          if-no-files-found: error

  release:
    name: release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Package binaries
        run: |
          cd dist
          chmod +x ap-text-client-macos/ap-text-client
          tar -C ap-text-client-macos -czf ap-text-client-macos.tar.gz ap-text-client
          (cd ap-text-client-windows && zip ../ap-text-client-windows.zip ap-text-client.exe)

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/ap-text-client-macos.tar.gz
            dist/ap-text-client-windows.zip
